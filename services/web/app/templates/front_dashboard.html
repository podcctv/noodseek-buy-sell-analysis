<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NodeSeek 买卖分析面板</title>
    <style>
      :root {
        --bg: linear-gradient(180deg, #f3f6ff 0%, #f8fafc 100%);
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --brand: #2563eb;
        --brand-dark: #1d4ed8;
        --ok: #16a34a;
        --warn: #ea580c;
        --unknown: #475569;
        --border: #e2e8f0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Inter", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container { width: min(1500px, 100% - 24px); margin: 20px auto; padding: 0 6px 24px; }
      .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; gap: 14px; flex-wrap: wrap; }
      .title { margin: 0; font-size: 38px; font-weight: 800; letter-spacing: 0.2px; }
      .tip { color: var(--muted); margin: 8px 0 0; font-size: 15px; }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        font-size: 16px;
        font-weight: 700;
        line-height: 1;
        border-radius: 10px;
        border: 1px solid var(--brand);
        background: var(--brand);
        color: #fff;
        text-decoration: none;
        cursor: pointer;
        transition: all .2s ease;
      }
      .btn:hover { background: var(--brand-dark); border-color: var(--brand-dark); transform: translateY(-1px); }
      .btn-ghost { background: #fff; color: var(--brand); border: 1px solid #93c5fd; }
      .btn-ghost:hover { color: #fff; }
      .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
      .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 16px; }
      .card {
        background: var(--card);
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
        padding: 16px;
      }
      .metric-title { color: var(--muted); font-size: 13px; margin: 0 0 8px; font-weight: 600; }
      .metric-val { margin: 0; font-size: 34px; font-weight: 800; }
      .metric-sub { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
      .row { display: grid; grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr); gap: 14px; align-items: stretch; }
      @media (max-width: 960px) {
        .row { grid-template-columns: 1fr; }
        .title { font-size: 30px; }
      }
      .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
      .chip {
        border: 1px solid #cbd5e1;
        background: #fff;
        border-radius: 999px;
        min-height: 34px;
        padding: 0 12px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
        transition: all .2s ease;
      }
      .chip:hover { border-color: var(--brand); color: var(--brand); background: #eff6ff; }
      .chip.active { border-color: var(--brand); background: #eff6ff; color: var(--brand); }
      .table-wrap { width: 100%; overflow-x: hidden; }
      table { width: 100%; border-collapse: collapse; table-layout: fixed; }
      th, td {
        text-align: left;
        border-bottom: 1px solid var(--border);
        padding: 10px 8px;
        font-size: 14px;
        vertical-align: top;
        line-height: 1.45;
        word-break: keep-all;
      }
      th.time-col, td.time-col,
      th.brand-col, td.brand-col,
      th.price-col, td.price-col,
      th.conf-col, td.conf-col,
      th.manage-col, td.manage-col { white-space: nowrap; }
      th.time-col, td.time-col { width: 168px; }
      th.type-col, td.type-col { width: 74px; }
      th.brand-col, td.brand-col { width: 94px; }
      th.price-col, td.price-col { width: 72px; }
      th.conf-col, td.conf-col { width: 66px; }
      th.manage-col, td.manage-col { width: 66px; }
      td.title-col { width: 34%; }
      td.prod-col { width: 28%; word-break: break-word; }
      .badge { display: inline-block; border-radius: 999px; padding: 3px 9px; color: #fff; font-size: 12px; font-weight: 700; white-space: nowrap; }
      .buy { background: var(--ok); }
      .sell { background: var(--warn); }
      .unknown { background: var(--unknown); }
      .list { margin: 0; padding: 0; list-style: none; }
      .list li {
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .list li span:first-child { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .small { color: var(--muted); font-size: 12px; white-space: nowrap; }
      .btn-mini {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 30px;
        padding: 0 10px;
        border-radius: 8px;
        border: 1px solid #93c5fd;
        background: #fff;
        color: var(--brand);
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
        transition: all .2s ease;
      }
      .btn-mini:hover { background: var(--brand); color: #fff; border-color: var(--brand); }
      .explain { margin-top: 10px; color: var(--muted); font-size: 13px; line-height: 1.6; }
      @media (max-width: 1280px) {
        .container { width: calc(100% - 18px); }
        th, td { padding: 9px 6px; font-size: 13px; }
        th.time-col, td.time-col { width: 156px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div>
          <h1 class="title">NodeSeek 买卖分析面板</h1>
          <p class="tip">实时抓取 RSS + AI 分类，聚焦买卖数据与品牌热度。</p>
        </div>
        <div class="btn-group">
          <button class="btn" id="pollNowBtn" type="button">立即抓取</button>
          <a class="btn btn-ghost" href="/progress">AI 处理进度</a>
          <a class="btn" href="/admin/login">进入后台配置</a>
        </div>
      </header>

      <section class="metrics">
        <article class="card"><p class="metric-title">帖子总量</p><p class="metric-val" id="totalCount">0</p><p class="metric-sub">实时累计</p></article>
        <article class="card"><p class="metric-title">求购占比</p><p class="metric-val" id="buyRate">0%</p><p class="metric-sub">需求端强度</p></article>
        <article class="card"><p class="metric-title">出售占比</p><p class="metric-val" id="sellRate">0%</p><p class="metric-sub">供给端强度</p></article>
        <article class="card"><p class="metric-title">平均置信度</p><p class="metric-val" id="avgConf">0</p><p class="metric-sub">AI 判断可信度</p></article>
      </section>

      <section class="row">
        <article class="card">
          <div class="toolbar">
            <strong>帖子明细（真实数据）</strong>
            <button class="chip active" data-filter="all">全部</button>
            <button class="chip" data-filter="buy">求购</button>
            <button class="chip" data-filter="sell">出售</button>
            <button class="chip" data-filter="unknown">待判断</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th class="type-col">类型</th><th class="time-col">发布时间</th><th>标题</th><th class="brand-col">品牌</th><th>商品名称 | 配置</th><th class="price-col">价格</th><th class="conf-col">置信度</th><th class="manage-col" id="adminActionHead" style="display:none;">管理</th></tr>
              </thead>
              <tbody id="postRows"></tbody>
            </table>
          </div>
        </article>

        <aside class="card">
          <h3 style="margin-top: 0; margin-bottom: 6px;">热门品牌</h3>
          <p class="small" style="margin-top:0;">仅按帖子品牌字段统计，不展示标题关键词。</p>
          <ul class="list" id="hotList"></ul>
          <p class="explain">想了解 AI 到底是如何处理的？请进入「AI 处理进度」页面查看每条任务状态、失败原因与重试/取消操作。</p>
        </aside>
      </section>
    </div>

    <script>
      let posts = [];
      let currentFilter = "all";
      let isAdmin = false;

      function toIntentLabel(intent) {
        if (intent === "buy") return "求购";
        if (intent === "sell") return "出售";
        return "待判断";
      }

      function buildEditUrl(post) {
        return `/admin/post-edit/${encodeURIComponent(post.uid || "")}`;
      }

      function renderRows() {
        const rows = document.getElementById("postRows");
        const current = currentFilter === "all" ? posts : posts.filter((p) => p.intent === currentFilter);
        rows.innerHTML = current.map((p) => `
          <tr>
            <td class="type-col"><span class="badge ${p.intent}">${toIntentLabel(p.intent)}</span></td>
            <td class="time-col">${formatToUtc8(p.time)}</td>
            <td class="title-col">${p.link ? `<a href="${p.link}" target="_blank">${p.title}</a>` : p.title}</td>
            <td class="brand-col">${p.brand || "未知"}</td>
            <td class="prod-col">${[p.product_name || "-", p.product_config || "-"].join(" | ")}</td>
            <td class="price-col">${p.price || "-"}</td>
            <td class="conf-col">${(Number(p.confidence || 0) * 100).toFixed(0)}%</td>
            ${isAdmin ? `<td class="manage-col"><a class="btn-mini" href="${buildEditUrl(p)}">编辑</a></td>` : ""}
          </tr>`).join("");
      }

      function renderMetrics(metrics) {
        document.getElementById("totalCount").textContent = metrics.total;
        document.getElementById("buyRate").textContent = `${metrics.buy_rate}%`;
        document.getElementById("sellRate").textContent = `${metrics.sell_rate}%`;
        document.getElementById("avgConf").textContent = Number(metrics.avg_conf || 0).toFixed(2);
      }

      function renderHot(hotWords) {
        const el = document.getElementById("hotList");
        if (!hotWords.length) {
          el.innerHTML = `<li><span>暂无品牌数据</span><span class="small">0 次</span></li>`;
          return;
        }
        el.innerHTML = hotWords.map(([word, count]) => `<li><span>${word}</span><span class="small">${count} 次</span></li>`).join("");
      }

      function formatToUtc8(value) {
        if (!value) return "-";
        const parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) return value;
        const utc8Ms = parsed.getTime() + (8 * 60 * 60 * 1000);
        const utc8 = new Date(utc8Ms);
        const year = utc8.getUTCFullYear();
        const month = String(utc8.getUTCMonth() + 1).padStart(2, "0");
        const day = String(utc8.getUTCDate()).padStart(2, "0");
        const hour = String(utc8.getUTCHours()).padStart(2, "0");
        const minute = String(utc8.getUTCMinutes()).padStart(2, "0");
        const second = String(utc8.getUTCSeconds()).padStart(2, "0");
        return `${year}-${month}-${day} ${hour}:${minute}:${second}`;
      }

      async function loadDashboard() {
        const res = await fetch("/api/v1/dashboard");
        const data = await res.json();
        posts = data.posts || [];
        isAdmin = Boolean(data.is_admin);
        const adminActionHead = document.getElementById("adminActionHead");
        adminActionHead.style.display = isAdmin ? "table-cell" : "none";
        renderRows();
        renderMetrics(data.metrics || { total: 0, buy_rate: 0, sell_rate: 0, avg_conf: 0 });
        renderHot(data.hot_words || []);
      }

      document.querySelectorAll(".chip").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".chip").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.filter;
          renderRows();
        });
      });

      document.getElementById("pollNowBtn").addEventListener("click", async () => {
        await fetch("/api/v1/poll-now", { method: "POST" });
      });

      async function tick() {
        try {
          await loadDashboard();
        } catch (e) {
          console.error(e);
        }
      }

      tick();
      setInterval(tick, 5000);
    </script>
  </body>
</html>
