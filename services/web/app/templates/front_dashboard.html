<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NodeSeek 买卖分析面板</title>
    <style>
      :root {
        --bg: #f1f5f9;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --brand: #2563eb;
        --ok: #16a34a;
        --warn: #ea580c;
        --unknown: #475569;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
      .container { max-width: 1100px; margin: 24px auto; padding: 0 16px 32px; }
      .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; gap: 10px; }
      .title { margin: 0; font-size: 28px; }
      .tip { color: var(--muted); margin: 6px 0 0; }
      .btn { display: inline-flex; align-items: center; justify-content: center; background: var(--brand); color: #fff; text-decoration: none; border-radius: 8px; padding: 10px 14px; font-weight: 600; border: 0; cursor: pointer; }
      .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
      .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
      .card { background: var(--card); border-radius: 12px; box-shadow: 0 1px 3px rgba(15, 23, 42, 0.1); padding: 14px; }
      .metric-title { color: var(--muted); font-size: 13px; margin: 0 0 6px; }
      .metric-val { margin: 0; font-size: 26px; font-weight: 700; }
      .metric-sub { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
      .row { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
      @media (max-width: 860px) { .row { grid-template-columns: 1fr; } }
      .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
      .chip { border: 1px solid #cbd5e1; background: #fff; border-radius: 999px; padding: 6px 10px; cursor: pointer; font-size: 13px; }
      .chip.active { border-color: var(--brand); color: var(--brand); }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; border-bottom: 1px solid #e2e8f0; padding: 9px 6px; font-size: 14px; vertical-align: top; }
      .badge { display: inline-block; border-radius: 999px; padding: 2px 8px; color: #fff; font-size: 12px; font-weight: 700; }
      .buy { background: var(--ok); }
      .sell { background: var(--warn); }
      .unknown { background: var(--unknown); }
      .list { margin: 0; padding: 0; list-style: none; }
      .list li { padding: 8px 0; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; gap: 10px; }
      .small { color: var(--muted); font-size: 12px; }
      .progress-item { border-bottom: 1px solid #e2e8f0; padding: 8px 0; }
      .progress-item:last-child { border-bottom: 0; }
      .status-running { color: #2563eb; }
      .status-done { color: #16a34a; }
      .status-failed { color: #dc2626; }
      .status-cancelled { color: #64748b; }
      .btn-mini { border: 1px solid #cbd5e1; background: #fff; color: #334155; border-radius: 6px; font-size: 12px; padding: 2px 6px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div>
          <h1 class="title">NodeSeek 买卖分析面板</h1>
          <p class="tip">实时抓取 RSS + AI 分类。可查看处理进度。</p>
        </div>
        <div class="btn-group">
          <button class="btn" id="pollNowBtn" type="button">立即抓取</button>
          <a class="btn" href="/admin/login">进入后台配置</a>
        </div>
      </header>

      <section class="metrics">
        <article class="card"><p class="metric-title">帖子总量</p><p class="metric-val" id="totalCount">0</p><p class="metric-sub">实时累计</p></article>
        <article class="card"><p class="metric-title">求购占比</p><p class="metric-val" id="buyRate">0%</p><p class="metric-sub">需求端强度</p></article>
        <article class="card"><p class="metric-title">出售占比</p><p class="metric-val" id="sellRate">0%</p><p class="metric-sub">供给端强度</p></article>
        <article class="card"><p class="metric-title">平均置信度</p><p class="metric-val" id="avgConf">0</p><p class="metric-sub">AI 判断可信度</p></article>
      </section>

      <section class="row">
        <article class="card">
          <div class="toolbar">
            <strong>帖子明细（真实数据）</strong>
            <button class="chip active" data-filter="all">全部</button>
            <button class="chip" data-filter="buy">求购</button>
            <button class="chip" data-filter="sell">出售</button>
            <button class="chip" data-filter="unknown">待判断</button>
          </div>
          <table>
            <thead>
              <tr><th>发布时间</th><th>标题</th><th>商品名称</th><th>意图</th><th>价格</th><th>置信度</th></tr>
            </thead>
            <tbody id="postRows"></tbody>
          </table>
        </article>

        <aside class="card">
          <h3 style="margin-top: 0;">热门关键词</h3>
          <ul class="list" id="hotList"></ul>
          <h3>AI 处理进度</h3>
          <p class="small" id="progressMeta">等待中...</p>
          <div id="progressList"></div>
        </aside>
      </section>
    </div>

    <script>
      let posts = [];
      let currentFilter = "all";

      function toIntentLabel(intent) {
        if (intent === "buy") return "求购";
        if (intent === "sell") return "出售";
        return "待判断";
      }

      function renderRows() {
        const rows = document.getElementById("postRows");
        const current = currentFilter === "all" ? posts : posts.filter((p) => p.intent === currentFilter);
        rows.innerHTML = current.map((p) => `
          <tr>
            <td>${p.time || "-"}</td>
            <td>${p.link ? `<a href="${p.link}" target="_blank">${p.title}</a>` : p.title}</td>
            <td>${p.product_name || "-"}</td>
            <td><span class="badge ${p.intent}">${toIntentLabel(p.intent)}</span></td>
            <td>${p.price || "-"}</td>
            <td>${(Number(p.confidence || 0) * 100).toFixed(0)}%</td>
          </tr>`).join("");
      }

      function renderMetrics(metrics) {
        document.getElementById("totalCount").textContent = metrics.total;
        document.getElementById("buyRate").textContent = `${metrics.buy_rate}%`;
        document.getElementById("sellRate").textContent = `${metrics.sell_rate}%`;
        document.getElementById("avgConf").textContent = Number(metrics.avg_conf || 0).toFixed(2);
      }

      function renderHot(hotWords) {
        const el = document.getElementById("hotList");
        el.innerHTML = hotWords.map(([word, count]) => `<li><span>${word}</span><span class="small">${count} 次</span></li>`).join("");
      }

      function formatToUtc8(value) {
        if (!value) return "-";
        const parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) return value;
        const utc8Ms = parsed.getTime() + (8 * 60 * 60 * 1000);
        const utc8 = new Date(utc8Ms);
        const year = utc8.getUTCFullYear();
        const month = String(utc8.getUTCMonth() + 1).padStart(2, "0");
        const day = String(utc8.getUTCDate()).padStart(2, "0");
        const hour = String(utc8.getUTCHours()).padStart(2, "0");
        const minute = String(utc8.getUTCMinutes()).padStart(2, "0");
        const second = String(utc8.getUTCSeconds()).padStart(2, "0");
        return `${year}-${month}-${day} ${hour}:${minute}:${second}`;
      }

      function renderProgress(data) {
        const meta = document.getElementById("progressMeta");
        meta.textContent = `状态: ${data.running ? "抓取/分析中" : "空闲"} | 最近抓取: ${formatToUtc8(data.last_fetch_at)}${data.last_error ? ` | 错误: ${data.last_error}` : ""}`;
        const list = document.getElementById("progressList");
        const statusClass = {
          running: "status-running",
          done: "status-done",
          failed: "status-failed",
          cancelled: "status-cancelled",
        };
        list.innerHTML = (data.items || []).map((item) => `
          <div class="progress-item">
            <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;">
              <div class="small ${statusClass[item.status] || ""}">${item.status}</div>
              ${item.status === "running" ? `<button type="button" class="btn-mini" data-cancel-uid="${item.uid}">取消</button>` : ""}
              ${item.status === "failed" ? `<button type="button" class="btn-mini" data-retry-uid="${item.uid}">重试</button>` : ""}
            </div>
            <div>${item.title || "-"}</div>
            <div class="small">${item.message || ""}</div>
          </div>
        `).join("");
      }

      async function loadDashboard() {
        const res = await fetch("/api/v1/dashboard");
        const data = await res.json();
        posts = data.posts || [];
        renderRows();
        renderMetrics(data.metrics || { total: 0, buy_rate: 0, sell_rate: 0, avg_conf: 0 });
        renderHot(data.hot_words || []);
      }

      async function loadProgress() {
        const res = await fetch("/api/v1/progress");
        const data = await res.json();
        renderProgress(data);
      }

      document.querySelectorAll(".chip").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".chip").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.filter;
          renderRows();
        });
      });

      document.getElementById("pollNowBtn").addEventListener("click", async () => {
        await fetch("/api/v1/poll-now", { method: "POST" });
        setTimeout(loadProgress, 300);
      });

      document.getElementById("progressList").addEventListener("click", async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const uid = target.dataset.cancelUid;
        if (uid) {
          await fetch(`/api/v1/progress/${uid}/cancel`, { method: "POST" });
          await loadProgress();
          return;
        }
        const retryUid = target.dataset.retryUid;
        if (!retryUid) return;
        await fetch(`/api/v1/progress/${retryUid}/retry`, { method: "POST" });
        await loadProgress();
      });

      async function tick() {
        try {
          await Promise.all([loadDashboard(), loadProgress()]);
        } catch (e) {
          console.error(e);
        }
      }

      tick();
      setInterval(tick, 5000);
    </script>
  </body>
</html>
